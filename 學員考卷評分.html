<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學員考核評分卷宗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --ink: #1c2333;
    --ink-soft: #4a5266;
    --ink-faint: #8a90a0;
    --gold: #a8873c;
    --gold-deep: #8a6d2a;
    --gold-pale: #f3ecdd;
    --paper: #fffdf6;
    --bg: #eceae4;
    --line: #ddd6c8;
    --line-soft: #e9e4d8;
    --rule: rgba(150, 138, 105, .38);
    --pen: #26356e;
    --red: #b3372a;
    --green: #3d6b4f;
    --serif: 'Noto Serif TC', 'Songti TC', 'LiSong Pro', 'PMingLiU', 'MingLiU', serif;
    --kai: 'Kaiti TC', 'BiauKai', 'DFKai-SB', '標楷體', 'TW-Kai', 'Noto Serif TC', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.75;
    min-height: 100vh;
  }

  /* ── 頂部橫幅 ─────────────────────────── */
  .masthead {
    background: linear-gradient(135deg, #1c2333 0%, #2a3349 60%, #1c2333 100%);
    color: #f5f1e8;
    padding: 34px 24px 30px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }
  .masthead .emblem {
    display: inline-block;
    font-family: var(--serif);
    font-size: 12px;
    letter-spacing: .5em;
    text-indent: .5em;
    color: #cdb877;
    border: 1px solid rgba(205,184,119,.45);
    padding: 4px 14px;
    margin-bottom: 14px;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 900;
    letter-spacing: .18em;
    text-indent: .18em;
  }
  .masthead p {
    margin-top: 8px;
    font-size: 13px;
    letter-spacing: .25em;
    text-indent: .25em;
    color: rgba(245,241,232,.65);
  }

  /* ── 版面 ─────────────────────────── */
  .layout {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 20px 80px;
    display: grid;
    grid-template-columns: 250px minmax(0,1fr);
    gap: 26px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ── 側欄 ─────────────────────────── */
  .sidebar { position: sticky; top: 20px; display: flex; flex-direction: column; gap: 18px; }
  @media (max-width: 900px) { .sidebar { position: static; } }

  .panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 2px 10px rgba(28,35,51,.06);
    overflow: hidden;
  }
  .panel-title {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .3em;
    text-indent: .3em;
    color: var(--gold-deep);
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--gold-pale);
  }
  .student-btn {
    display: block; width: 100%; text-align: left;
    background: none; border: none; border-bottom: 1px solid var(--line-soft);
    padding: 13px 16px; cursor: pointer; font-family: inherit; transition: background .15s;
  }
  .student-btn:last-child { border-bottom: none; }
  .student-btn:hover { background: #faf7ef; }
  .student-btn.active { background: #fdf9ef; box-shadow: inset 3px 0 0 var(--gold); }
  .student-btn .s-name { font-family: var(--serif); font-size: 17px; font-weight: 700; letter-spacing: .1em; }
  .student-btn .s-meta { font-size: 11.5px; color: var(--ink-faint); margin-top: 2px; }
  .student-btn .s-progress { font-size: 11.5px; margin-top: 4px; color: var(--ink-soft); display: flex; gap: 10px; }
  .student-btn .done { color: var(--green); font-weight: 500; }

  .tools { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .tool-btn {
    display: block; width: 100%; padding: 9px 12px;
    font-family: inherit; font-size: 13px; letter-spacing: .12em;
    cursor: pointer; border-radius: 4px; border: 1px solid var(--line);
    background: #fff; color: var(--ink-soft); transition: all .15s;
  }
  .tool-btn:hover { border-color: var(--gold); color: var(--gold-deep); }
  .tool-btn.primary { background: var(--ink); border-color: var(--ink); color: #f0ead9; }
  .tool-btn.primary:hover { background: #2a3349; }
  .save-hint { font-size: 11px; color: var(--ink-faint); text-align: center; padding: 0 14px 12px; letter-spacing: .05em; }

  /* ── 主區:階段頁籤 ─────────────────────── */
  .stage-tabs { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .stage-tab {
    flex: 1; min-width: 220px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 6px;
    padding: 13px 18px; cursor: pointer; font-family: inherit; text-align: left;
    transition: all .15s; box-shadow: 0 2px 8px rgba(28,35,51,.05);
  }
  .stage-tab:hover { border-color: var(--gold); }
  .stage-tab.active {
    border-color: var(--gold); background: #fdf9ef;
    box-shadow: inset 0 3px 0 var(--gold), 0 2px 8px rgba(28,35,51,.05);
  }
  .stage-tab .t-label { font-size: 11px; letter-spacing: .25em; color: var(--gold-deep); }
  .stage-tab .t-name { font-family: var(--serif); font-size: 16.5px; font-weight: 700; letter-spacing: .06em; margin-top: 2px; }
  .stage-tab .t-stat { font-size: 12px; color: var(--ink-faint); margin-top: 3px; }

  /* ── 考卷(紙本樣式)─────────────────────── */
  .paper {
    background: var(--paper);
    border: 1px solid var(--line);
    box-shadow: 0 4px 22px rgba(28,35,51,.08);
    padding: 16px;
  }
  .sheet {
    border: 2px solid var(--ink);
    position: relative;
    padding: 40px 48px 46px;
  }
  .sheet::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--ink);
    pointer-events: none;
  }
  @media (max-width: 700px) {
    .paper { padding: 8px; }
    .sheet { padding: 26px 18px 32px; }
  }

  .p-school {
    font-family: var(--serif);
    text-align: center;
    font-size: 15px;
    letter-spacing: .45em;
    text-indent: .45em;
    color: var(--ink-soft);
  }
  .p-title {
    font-family: var(--serif);
    text-align: center;
    font-size: 27px;
    font-weight: 900;
    letter-spacing: .22em;
    text-indent: .22em;
    margin-top: 6px;
  }
  .p-sub {
    text-align: center;
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: .35em;
    text-indent: .35em;
    color: var(--gold-deep);
    margin-top: 4px;
  }

  /* 卷頭資訊表格 */
  .head-grid {
    width: 100%;
    border-collapse: collapse;
    margin-top: 22px;
    font-size: 13px;
  }
  .head-grid th, .head-grid td {
    border: 1px solid var(--ink);
    padding: 7px 12px;
    text-align: left;
    font-weight: 400;
  }
  .head-grid th {
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: .2em;
    background: var(--gold-pale);
    white-space: nowrap;
    width: 1%;
    text-align: center;
  }
  .head-grid td { word-break: break-all; }
  .head-grid .v-cell {
    font-family: var(--kai);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .2em;
    color: var(--red);
    text-align: center;
  }
  .head-grid .stat-line { letter-spacing: .04em; color: var(--ink-soft); }
  .head-grid .stat-line b { color: var(--red); font-weight: 700; }
  .head-grid .legend-line { font-size: 12px; color: var(--ink-faint); letter-spacing: .03em; }

  /* 大題標題 */
  .sec-title {
    font-family: var(--serif);
    font-size: 16.5px;
    font-weight: 700;
    letter-spacing: .18em;
    margin: 34px 0 6px;
    padding-bottom: 5px;
    border-bottom: 3px double var(--ink);
  }
  .sec-title small {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: .08em;
    color: var(--ink-faint);
    margin-left: 10px;
  }

  /* 題目與作答 */
  .question { margin: 26px 0 30px; }
  .q-line {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 15.5px;
    display: flex;
    gap: 4px;
  }
  .q-line .q-no { flex-shrink: 0; font-weight: 900; }
  .answer {
    font-family: var(--kai);
    font-size: 15px;
    color: var(--pen);
    white-space: pre-wrap;
    word-break: break-word;
    margin: 8px 0 0 26px;
    padding: 0 2px;
    line-height: 2.15;
    min-height: 2.15em;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent calc(2.15em - 1px),
      var(--rule) calc(2.15em - 1px),
      var(--rule) 2.15em
    );
  }
  .answer.empty { color: var(--ink-faint); }

  /* 紅筆評閱區 */
  .mark-row {
    margin: 10px 0 0 26px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .mark-label {
    font-family: var(--kai);
    color: var(--red);
    font-size: 13.5px;
    letter-spacing: .25em;
    border: 1px solid var(--red);
    border-radius: 50%;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    opacity: .85;
  }
  .mark-main { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 6px; }
  .mark-opts-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .mark-hint {
    font-size: 12px;
    color: rgba(179,55,42,.62);
    letter-spacing: .04em;
    min-height: 1em;
  }
  .mark-opts { display: flex; gap: 8px; flex-shrink: 0; margin-top: 2px; }
  .mark-opt {
    font-family: var(--kai);
    font-size: 14.5px;
    letter-spacing: .12em;
    color: var(--red);
    background: transparent;
    border: 1.5px solid rgba(179,55,42,.55);
    border-radius: 4px;
    padding: 3px 13px;
    cursor: pointer;
    transition: all .12s;
  }
  .mark-opt:hover { border-color: var(--red); background: rgba(179,55,42,.06); }
  .mark-opt.sel {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
    box-shadow: 1px 1px 0 rgba(179,55,42,.3);
  }
  .mark-comment { width: 100%; }
  .mark-comment textarea {
    width: 100%;
    font-family: var(--kai);
    font-size: 14.5px;
    color: var(--red);
    line-height: 2;
    min-height: 2em;
    padding: 2px 4px 0;
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(179,55,42,.6);
    resize: vertical;
    outline: none;
  }
  .mark-comment textarea:focus { border-bottom-color: var(--red); background: rgba(179,55,42,.04); }
  .mark-comment textarea::placeholder { color: rgba(179,55,42,.4); }

  /* 總評與評定 */
  .overall {
    margin-top: 40px;
    border: 1.5px solid var(--ink);
  }
  .overall .o-head {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .35em;
    text-indent: .35em;
    text-align: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--ink);
    background: var(--gold-pale);
  }
  .overall .o-body { padding: 16px 20px 20px; }
  .o-verdict {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .o-verdict .v-label {
    font-family: var(--serif);
    letter-spacing: .2em;
    color: var(--ink);
    font-weight: 600;
    font-size: 14px;
  }
  .o-verdict label {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    font-family: var(--kai);
    font-size: 15px;
    color: var(--red);
    padding: 2px 12px;
    border: 1.5px solid rgba(179,55,42,.45);
    border-radius: 4px;
    transition: all .12s;
  }
  .o-verdict label:hover { border-color: var(--red); }
  .o-verdict input { accent-color: var(--red); cursor: pointer; }
  .o-verdict label.on { background: var(--red); color: #fff; border-color: var(--red); }
  .overall textarea {
    width: 100%;
    min-height: 84px;
    font-family: var(--kai);
    font-size: 15px;
    color: var(--red);
    line-height: 2.15;
    padding: 0 4px;
    background: transparent;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent calc(2.15em - 1px),
      rgba(179,55,42,.25) calc(2.15em - 1px),
      rgba(179,55,42,.25) 2.15em
    );
    border: none;
    resize: vertical;
    outline: none;
  }
  .overall textarea::placeholder { color: rgba(179,55,42,.4); }

  .toast {
    position: fixed;
    bottom: 26px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #f0ead9;
    font-size: 13px;
    letter-spacing: .15em;
    padding: 10px 26px;
    border-radius: 100px;
    box-shadow: 0 6px 24px rgba(28,35,51,.3);
    transition: transform .3s ease;
    z-index: 99;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── 學員成績通知單(PDF 輸出)─────────── */
  #reportArea { display: none; }
  body.report-mode .masthead,
  body.report-mode .layout,
  body.report-mode .toast { display: none !important; }
  body.report-mode #reportArea { display: block; }

  .report {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 30px 60px;
    background: #fff;
    color: var(--ink);
    font-size: 13.5px;
  }
  .report .r-sheet {
    border: 2px solid var(--ink);
    position: relative;
    padding: 40px 46px 46px;
  }
  .report .r-sheet::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--ink);
    pointer-events: none;
  }
  .report .r-school {
    font-family: var(--serif);
    text-align: center;
    font-size: 15px;
    letter-spacing: .45em;
    text-indent: .45em;
    color: var(--ink-soft);
  }
  .report h2 {
    font-family: var(--serif);
    text-align: center;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: .3em;
    text-indent: .3em;
    margin-top: 6px;
  }
  .r-verdict-wrap { position: relative; margin-top: 20px; }
  .r-stamp {
    position: absolute;
    right: 0; top: -64px;
    font-family: var(--kai);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: .3em;
    text-indent: .3em;
    padding: 8px 16px;
    border: 3px double var(--red);
    border-radius: 6px;
    color: var(--red);
    transform: rotate(-7deg);
    background: rgba(255,255,255,.75);
    opacity: .92;
    z-index: 2;
  }

  .r-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 13px;
  }
  .r-table th, .r-table td {
    border: 1px solid var(--ink);
    padding: 8px 12px;
    text-align: center;
  }
  .r-table th {
    background: var(--gold-pale);
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: .15em;
  }
  .r-table .v-pass { color: var(--green); font-weight: 700; letter-spacing: .1em; }
  .r-table .v-retake { color: var(--red); font-weight: 700; letter-spacing: .1em; }
  .r-legend {
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: .03em;
  }

  .r-info {
    display: flex;
    justify-content: space-between;
    gap: 12px 30px;
    flex-wrap: wrap;
    margin-top: 16px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .r-info b { color: var(--ink); font-weight: 500; margin-left: 6px; }

  .r-stage { margin-top: 34px; }
  .r-stage-head {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .15em;
    padding-bottom: 5px;
    border-bottom: 3px double var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 6px;
  }
  .r-stage-head small {
    font-family: var(--kai);
    font-size: 13.5px;
    font-weight: 400;
    letter-spacing: .08em;
    color: var(--red);
  }
  .r-sec {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .15em;
    margin: 20px 0 2px;
    color: var(--gold-deep);
  }
  .r-q { margin-top: 16px; break-inside: avoid; }
  .r-q .r-q-title {
    font-family: var(--serif);
    font-weight: 600;
    display: flex;
    gap: 4px;
  }
  .r-q .r-q-title .no { font-weight: 900; flex-shrink: 0; }
  .r-q .r-ans {
    font-family: var(--kai);
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--pen);
    margin: 4px 0 0 24px;
    font-size: 14px;
    line-height: 2.1;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent calc(2.1em - 1px),
      var(--rule) calc(2.1em - 1px),
      var(--rule) 2.1em
    );
  }
  .r-q .r-mark {
    margin: 6px 0 0 24px;
    font-family: var(--kai);
    font-size: 14px;
    color: var(--red);
    line-height: 1.9;
  }
  .r-q .r-mark .r-m-stamp {
    display: inline-block;
    border: 1.5px solid var(--red);
    border-radius: 4px;
    padding: 0 10px;
    margin-right: 10px;
    letter-spacing: .12em;
  }
  .r-q .r-mark .cm { white-space: pre-wrap; word-break: break-word; }
  .r-overall {
    margin-top: 20px;
    border: 1.5px solid var(--ink);
    padding: 10px 16px 12px;
  }
  .r-overall .lbl {
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: .25em;
    display: block;
    margin-bottom: 2px;
  }
  .r-overall .txt {
    font-family: var(--kai);
    color: var(--red);
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 14.5px;
    line-height: 2;
  }
  .r-foot {
    margin-top: 44px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 30px;
    flex-wrap: wrap;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .r-foot .sign { min-width: 220px; text-align: center; }
  .r-foot .sign .line { border-bottom: 1px solid var(--ink); height: 44px; }
  .r-foot .sign .cap { margin-top: 6px; letter-spacing: .3em; text-indent: .3em; font-family: var(--serif); }

  /* ── 列印 ─────────────────────── */
  @media print {
    body { background: #fff; }
    .masthead, .sidebar, .stage-tabs { display: none !important; }
    .layout { display: block; padding: 0; max-width: none; }
    .paper { border: none; box-shadow: none; padding: 0; }
    .question { break-inside: avoid; }
    .mark-opt:not(.sel) { display: none; }
    .mark-hint { display: none; }
    .mark-comment textarea:placeholder-shown { visibility: hidden; }
    .o-verdict label:not(.on) { display: none; }
    .o-verdict input { display: none; }
    textarea { resize: none; border: none !important; }
    body.report-mode .report { max-width: none; padding: 0; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="emblem">TASHIR ZARNA GEM ACADEMY</div>
  <h1>學員考核評分卷宗</h1>
  <p>泰熙爾札娜寶石學院 · 代理培訓兩階段考核</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="panel">
      <div class="panel-title">應 試 學 員</div>
      <div id="studentList"></div>
    </div>
    <div class="panel">
      <div class="panel-title">卷 宗 工 具</div>
      <div class="tools">
        <button class="tool-btn primary" onclick="exportReport()">輸出學員成績單 (PDF)</button>
        <button class="tool-btn" onclick="window.print()">列印評閱中考卷</button>
        <button class="tool-btn" onclick="exportCSV()">匯出評閱總表 (CSV)</button>
        <button class="tool-btn" onclick="exportJSON()">備份評閱資料 (JSON)</button>
        <button class="tool-btn" onclick="importJSON()">還原評閱資料</button>

/* ═══════════════ 狀態與儲存 ═══════════════ */

const STORE_KEY = 'examGrades_v2';
const MARK_KEYS = ['pass', 'ok', 'improve'];
const MARKS = { pass: '合格', ok: '再加強', improve: '不合格' };
const HINTS = {
  pass: '已確實掌握本題內容,無需補考',
  ok: '大致掌握,請依紅筆評語複習加強',
  improve: '尚未掌握,請重新學習後補考本題'
};
const VERDICTS = { pass: '過關', retake: '需補考' };

let grades = {};
try { grades = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { grades = {}; }
// 由 v1(打分數版)搬移評語/總評/評定;分數制已停用,不搬移
try {
  if (!Object.keys(grades).length) {
    const old = JSON.parse(localStorage.getItem('examGrades_v1'));
    if (old) {
      for (const k in old) {
        grades[k] = { marks: {}, comments: old[k].comments || {}, overall: old[k].overall || '', verdict: old[k].verdict || '' };
      }
      localStorage.setItem(STORE_KEY, JSON.stringify(grades));
    }
  }
} catch (e) {}

let currentStudent = 0;
let currentStage = 'stage1';

function gkey(sIdx, stage) { return STUDENTS[sIdx].name + '|' + stage; }
function getGrade(sIdx, stage) {
  const k = gkey(sIdx, stage);
  if (!grades[k]) grades[k] = { marks: {}, comments: {}, overall: '', verdict: '' };
  if (!grades[k].marks) grades[k].marks = {};
  if (grades[k].verdict === undefined) grades[k].verdict = '';
  return grades[k];
}
let saveTimer = null;
function persist() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORE_KEY, JSON.stringify(grades));
  }, 250);
}

function flatIndex(exam, sec, qi) {
  let idx = 0;
  for (const s of exam.sections) {
    if (s === sec) return idx + qi;
    idx += s.questions.length;
  }
  return idx;
}

function stageStats(sIdx, stage) {
  const exam = EXAMS.find(e => e.id === stage);
  const total = exam.sections.reduce((n, s) => n + s.questions.length, 0);
  const g = getGrade(sIdx, stage);
  const c = { pass: 0, ok: 0, improve: 0 };
  Object.values(g.marks).forEach(v => { if (c[v] !== undefined) c[v]++; });
  return { total, done: c.pass + c.ok + c.improve, c };
}

function esc(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function statLine(st) {
  return `已評 <b>${st.done}</b> / ${st.total} 題　　合格 <b>${st.c.pass}</b>　再加強 <b>${st.c.ok}</b>　不合格 <b>${st.c.improve}</b>`;
}

/* ═══════════════ 渲染 ═══════════════ */

function renderSidebar() {
  const el = document.getElementById('studentList');
  el.innerHTML = STUDENTS.map((s, i) => {
    const s1 = stageStats(i, 'stage1'), s2 = stageStats(i, 'stage2');
    const p = (st) => `<span class="${st.done === st.total ? 'done' : ''}">${st.done}/${st.total} 題</span>`;
    return `<button class="student-btn ${i === currentStudent ? 'active' : ''}" onclick="selectStudent(${i})">
      <div class="s-name">${s.name}</div>
      <div class="s-meta">LINE:${s.line}</div>
      <div class="s-progress">一階 ${p(s1)} · 二階 ${p(s2)}</div>
    </button>`;
  }).join('');
}

function renderPaper() {
  const s = STUDENTS[currentStudent];
  const exam = EXAMS.find(e => e.id === currentStage);
  const sub = s.submissions[currentStage];
  const g = getGrade(currentStudent, currentStage);
  const stats = stageStats(currentStudent, currentStage);

  const tabs = `<div class="stage-tabs">` + EXAMS.map(e => {
    const st = stageStats(currentStudent, e.id);
    return `<button class="stage-tab ${e.id === currentStage ? 'active' : ''}" onclick="selectStage('${e.id}')">
      <div class="t-label">${e.label}</div>
      <div class="t-name">${e.title}</div>
      <div class="t-stat">已評 ${st.done} / ${st.total} 題</div>
    </button>`;
  }).join('') + `</div>`;

  let qGlobal = 0;
  const body = exam.sections.map((sec, secI) => {
    const secHead = `<div class="sec-title">${exam.sections.length > 1 ? sec.name : '本 卷 試 題'}<small>${sec.note}</small></div>`;
    const qs = sec.questions.map((q, qi) => {
      qGlobal++;
      const id = secI + '-' + qi;
      const ans = (sub.answers[flatIndex(exam, sec, qi)] || '').trim();
      const mark = g.marks[id] || '';
      const comment = g.comments[id] ?? '';
      const opts = MARK_KEYS.map(k =>
        `<button class="mark-opt ${mark === k ? 'sel' : ''}" data-q="${id}" data-v="${k}" title="${HINTS[k]}"
                 onclick="setMark('${id}','${k}')"
                 onmouseenter="showHint('${id}','${k}')" onmouseleave="restoreHint('${id}')">${MARKS[k]}</button>`).join('');
      return `<div class="question">
        <div class="q-line"><span class="q-no">${qGlobal}、</span><span>${esc(q)}</span></div>
        <div class="answer ${ans ? '' : 'empty'}">${ans ? esc(ans) : '(未作答)'}</div>
        <div class="mark-row">
          <span class="mark-label">評</span>
          <div class="mark-main">
            <div class="mark-opts-row">
              <div class="mark-opts">${opts}</div>
              <span class="mark-hint" id="hint-${id}">${mark ? HINTS[mark] : ''}</span>
            </div>
            <div class="mark-comment">
              <textarea rows="1" placeholder="紅筆評語、訂正…"
                        oninput="setComment('${id}', this.value)">${esc(comment)}</textarea>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
    return secHead + qs;
  }).join('');

  document.getElementById('paperArea').innerHTML = tabs + `
  <article class="paper"><div class="sheet">
    <div class="p-school">泰 熙 爾 札 娜 寶 石 學 院</div>
    <h2 class="p-title">${exam.title}</h2>
    <div class="p-sub">${exam.label.replace(/\s/g, '')} 考 核 試 卷</div>
    <table class="head-grid">
      <tr>
        <th>姓　名</th><td>${s.name}</td>
        <th>LINE 名稱</th><td>${s.line}</td>
        <th>繳卷時間</th><td>${sub.time}</td>
      </tr>
      <tr>
        <th>電子郵件</th><td colspan="3">${s.email}</td>
        <th>本卷評定</th><td class="v-cell" id="verdictCell">${g.verdict ? VERDICTS[g.verdict] : '評閱中'}</td>
      </tr>
      <tr>
        <th>評閱統計</th><td colspan="5" class="stat-line" id="statCell">${statLine(stats)}</td>
      </tr>
      <tr>
        <th>評閱說明</th><td colspan="5" class="legend-line">合格=已確實掌握;再加強=大致掌握,請依評語複習;不合格=尚未掌握,需重新學習後補考。</td>
      </tr>
    </table>
    ${body}
    <div class="overall">
      <div class="o-head">總 評 與 評 定</div>
      <div class="o-body">
        <div class="o-verdict" id="verdictRow">
          <span class="v-label">本卷評定:</span>
          <label class="${g.verdict === 'pass' ? 'on' : ''}">
            <input type="radio" name="verdict-${currentStage}" value="pass" ${g.verdict === 'pass' ? 'checked' : ''}
                   onchange="setVerdict('pass')">過關
          </label>
          <label class="${g.verdict === 'retake' ? 'on' : ''}">
            <input type="radio" name="verdict-${currentStage}" value="retake" ${g.verdict === 'retake' ? 'checked' : ''}
                   onchange="setVerdict('retake')">需補考
          </label>
          <label class="${!g.verdict ? 'on' : ''}">
            <input type="radio" name="verdict-${currentStage}" value="" ${!g.verdict ? 'checked' : ''}
                   onchange="setVerdict('')">尚未評定
          </label>
        </div>
        <textarea placeholder="整體評語、後續培訓建議、補考範圍…"
                  oninput="setOverall(this.value)">${esc(g.overall || '')}</textarea>
      </div>
    </div>
  </div></article>`;
}

/* ═══════════════ 互動 ═══════════════ */

function selectStudent(i) {
  currentStudent = i;
  renderSidebar();
  renderPaper();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function selectStage(id) {
  currentStage = id;
  renderPaper();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function setMark(id, val) {
  const g = getGrade(currentStudent, currentStage);
  g.marks[id] = (g.marks[id] === val) ? '' : val;   // 再點一次可取消
  if (!g.marks[id]) delete g.marks[id];
  persist();
  document.querySelectorAll(`.mark-opt[data-q="${id}"]`).forEach(b => {
    b.classList.toggle('sel', b.dataset.v === g.marks[id]);
  });
  restoreHint(id);
  refreshStats();
}
function setComment(id, val) {
  getGrade(currentStudent, currentStage).comments[id] = val;
  persist();
}
function showHint(id, k) {
  const el = document.getElementById('hint-' + id);
  if (el) el.textContent = HINTS[k];
}
function restoreHint(id) {
  const el = document.getElementById('hint-' + id);
  if (!el) return;
  const m = getGrade(currentStudent, currentStage).marks[id];
  el.textContent = m ? HINTS[m] : '';
}
function setOverall(val) {
  getGrade(currentStudent, currentStage).overall = val;
  persist();
}
function setVerdict(val) {
  const g = getGrade(currentStudent, currentStage);
  g.verdict = val;
  persist();
  const row = document.getElementById('verdictRow');
  const labels = row.querySelectorAll('label');
  labels.forEach(l => l.classList.remove('on'));
  if (val === 'pass') labels[0].classList.add('on');
  else if (val === 'retake') labels[1].classList.add('on');
  else labels[2].classList.add('on');
  document.getElementById('verdictCell').textContent = val ? VERDICTS[val] : '評閱中';
}
function refreshStats() {
  const stats = stageStats(currentStudent, currentStage);
  document.getElementById('statCell').innerHTML = statLine(stats);
  const tabs = document.querySelectorAll('.stage-tab');
  EXAMS.forEach((e, i) => {
    const st = stageStats(currentStudent, e.id);
    if (tabs[i]) tabs[i].querySelector('.t-stat').textContent = `已評 ${st.done} / ${st.total} 題`;
  });
  renderSidebar();
}

/* ═══════════════ 學員成績單 PDF ═══════════════ */

function exportReport() {
  const sIdx = currentStudent;
  const s = STUDENTS[sIdx];

  const pending = EXAMS.filter(e => !getGrade(sIdx, e.id).verdict).map(e => e.title);
  if (pending.length) {
    if (!confirm(`「${s.name}」尚未評定:${pending.join('、')}(總評區的「本卷評定」)。\n仍要輸出成績單嗎?未評定的卷將標示「評閱中」。`)) return;
  }

  const anyRetake = EXAMS.some(e => getGrade(sIdx, e.id).verdict === 'retake');
  const allPass = EXAMS.every(e => getGrade(sIdx, e.id).verdict === 'pass');
  const stampHtml = anyRetake
    ? '<div class="r-stamp">需 補 考</div>'
    : (allPass ? '<div class="r-stamp">合 格</div>' : '');

  const summaryRows = EXAMS.map(e => {
    const st = stageStats(sIdx, e.id);
    const v = getGrade(sIdx, e.id).verdict;
    const vHtml = v === 'pass' ? '<span class="v-pass">過關</span>'
                : v === 'retake' ? '<span class="v-retake">需補考</span>'
                : '<span style="color:var(--ink-faint)">評閱中</span>';
    return `<tr>
      <td>${e.label.replace(/\s/g, '')}</td>
      <td style="text-align:left">${e.title}</td>
      <td>${st.c.pass}</td>
      <td>${st.c.ok}</td>
      <td>${st.c.improve}</td>
      <td>${vHtml}</td>
    </tr>`;
  }).join('');

  const stages = EXAMS.map(exam => {
    const g = getGrade(sIdx, exam.id);
    const sub = s.submissions[exam.id];
    let n = 0;
    const body = exam.sections.map((sec, secI) => {
      const qs = sec.questions.map((q, qi) => {
        n++;
        const id = secI + '-' + qi;
        const ans = (sub.answers[flatIndex(exam, sec, qi)] || '').trim();
        const mark = g.marks[id] || '';
        const comment = (g.comments[id] || '').trim();
        let markHtml = '';
        if (mark || comment) {
          markHtml = `<div class="r-mark">` +
            (mark ? `<span class="r-m-stamp">${MARKS[mark]}</span>` : '') +
            (comment ? `<span class="cm">${esc(comment)}</span>` : '') +
            `</div>`;
        }
        return `<div class="r-q">
          <div class="r-q-title"><span class="no">${n}、</span><span>${esc(q)}</span></div>
          <div class="r-ans">${ans ? esc(ans) : '(未作答)'}</div>
          ${markHtml}
        </div>`;
      }).join('');
      return (exam.sections.length > 1 ? `<div class="r-sec">${sec.name}(${sec.note})</div>` : '') + qs;
    }).join('');
    const vTxt = g.verdict ? VERDICTS[g.verdict] : '評閱中';
    const overall = (g.overall || '').trim();
    return `<section class="r-stage">
      <div class="r-stage-head">
        <span>${exam.label.replace(/\s/g, '')}|${exam.title}</span>
        <small>評定:${vTxt}</small>
      </div>
      ${body}
      ${overall ? `<div class="r-overall"><span class="lbl">本 卷 總 評</span><div class="txt">${esc(overall)}</div></div>` : ''}
    </section>`;
  }).join('');

  const today = new Date();
  const dateStr = `${today.getFullYear()} 年 ${today.getMonth() + 1} 月 ${today.getDate()} 日`;

  document.getElementById('reportArea').innerHTML = `<div class="report"><div class="r-sheet">
    <div class="r-school">泰 熙 爾 札 娜 寶 石 學 院</div>
    <h2>考核成績通知單</h2>
    <div class="r-info">
      <span>學員姓名:<b>${s.name}</b></span>
      <span>LINE 名稱:<b>${s.line}</b></span>
      <span>發送日期:<b>${dateStr}</b></span>
    </div>
    <div class="r-verdict-wrap">
      ${stampHtml}
      <table class="r-table">
        <thead><tr><th>階段</th><th>考核名稱</th><th>合格</th><th>再加強</th><th>不合格</th><th>評定結果</th></tr></thead>
        <tbody>${summaryRows}</tbody>
      </table>
      <div class="r-legend">評閱等級說明:合格=已確實掌握;再加強=大致掌握,請依紅筆評語複習加強;不合格=尚未掌握,請重新學習後補考。</div>
    </div>
    ${stages}
    <div class="r-foot">
      <span>本通知單由泰熙爾札娜寶石學院評閱後發出,如對成績有疑問請與學院聯繫。</span>
      <div class="sign"><div class="line"></div><div class="cap">評 閱 教 師 簽 章</div></div>
    </div>
  </div></div>`;

  document.body.classList.add('report-mode');
  const cleanup = () => {
    document.body.classList.remove('report-mode');
    document.getElementById('reportArea').innerHTML = '';
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  setTimeout(() => window.print(), 50);
}

/* ═══════════════ 匯出/還原 ═══════════════ */

function exportCSV() {
  const rows = [['學員姓名', '考核階段', '大題', '題號', '題目', '評閱結果', '評語', '本卷評定']];
  STUDENTS.forEach((s, si) => {
    EXAMS.forEach(exam => {
      const g = getGrade(si, exam.id);
      let n = 0;
      exam.sections.forEach((sec, secI) => {
        sec.questions.forEach((q, qi) => {
          n++;
          const id = secI + '-' + qi;
          rows.push([s.name, exam.title, sec.name, n, q, g.marks[id] ? MARKS[g.marks[id]] : '', g.comments[id] ?? '', '']);
        });
      });
      const st = stageStats(si, exam.id);
      rows.push([s.name, exam.title, '—', '', '總評',
        `合格${st.c.pass}/再加強${st.c.ok}/不合格${st.c.improve}`,
        g.overall ?? '', g.verdict ? VERDICTS[g.verdict] : '未評定']);
    });
  });
  const csv = '\ufeff' + rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\r\n');
  download(new Blob([csv], { type: 'text/csv;charset=utf-8' }), '學員考核評閱總表.csv');
  toast('已匯出評閱總表');
}

function exportJSON() {
  download(new Blob([JSON.stringify(grades, null, 2)], { type: 'application/json' }), '評閱資料備份.json');
  toast('已匯出評閱備份');
}

function importJSON() {
  const input = document.getElementById('importFile');
  input.onchange = () => {
    const f = input.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        grades = JSON.parse(reader.result);
        persist();
        renderSidebar();
        renderPaper();
        toast('已還原評閱資料');
      } catch (e) { toast('檔案格式錯誤,無法還原'); }
      input.value = '';
    };
    reader.readAsText(f);
  };
  input.click();
}

function clearCurrent() {
  const s = STUDENTS[currentStudent];
  const exam = EXAMS.find(e => e.id === currentStage);
  if (!confirm(`確定清除「${s.name} — ${exam.title}」的所有評閱與評語?`)) return;
  delete grades[gkey(currentStudent, currentStage)];
  persist();
  renderSidebar();
  renderPaper();
  toast('已清除本卷評閱');
}

function download(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ═══════════════ 啟動 ═══════════════ */
renderSidebar();
renderPaper();
</script>
